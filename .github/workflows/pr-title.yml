name: Validate PR title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  title-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check title format
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const pattern = /^(feat|fix|docs|chore|refactor|test|build|ci|perf)(\([^)]+\))?:\s.+/;
            if (!pattern.test(title)) {
              core.setFailed(
                'PR title must follow Conventional Commits format, for example: feat(frontend): add flood trend chart'
              );
            }
