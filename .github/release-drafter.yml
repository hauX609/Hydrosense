name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE by @$AUTHOR in #$NUMBER"
no-changes-template: "- No user-facing changes in this release"

version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - enhancement
      - feature
  patch:
    labels:
      - bug
      - fix
      - documentation
      - dependencies
      - chore
  default: patch

categories:
  - title: "Features"
    labels:
      - feature
      - enhancement
  - title: "Bug Fixes"
    labels:
      - bug
      - fix
  - title: "Documentation"
    labels:
      - documentation
  - title: "Dependencies"
    labels:
      - dependencies
  - title: "Maintenance"
    labels:
      - chore

template: |
  ## What Changed

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
